name = "freellm"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Cloudflare Workers AI binding (for fallback)
[[ai]]
binding = "AI"

# KV namespace for rate limit tracking
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"

# Environment variables — set these with `wrangler secret put <KEY>`
# GROQ_API_KEY         - from https://console.groq.com
# CEREBRAS_API_KEY     - from https://cloud.cerebras.ai
# GOOGLE_API_KEY       - from https://aistudio.google.com
# OPENROUTER_API_KEY   - from https://openrouter.ai
# COHERE_API_KEY       - from https://cohere.com
# FREELLM_API_KEY      - optional auth key to protect your deployment
